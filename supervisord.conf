[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:webapp]
command=python web.py
directory=/app
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:bot]
command=python app.py
directory=/app
autostart=true
autorestart=true
startsecs=35
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
